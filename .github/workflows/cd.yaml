name: CD

on:
  release:
    types:
      - prereleased
      - published

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release executable
        run: cargo build --release --locked

      - name: Prepare release assets
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $exeName = "WinRehome-$tag-windows-x64.exe"
          Copy-Item -LiteralPath "target\release\winrehome.exe" -Destination $exeName
          $hash = (Get-FileHash -LiteralPath $exeName -Algorithm SHA256).Hash.ToLower()
          Set-Content -LiteralPath "$exeName.sha256" -Value "$hash *$exeName"

      - name: Upload executable to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            "WinRehome-${{ github.event.release.tag_name }}-windows-x64.exe" `
            "WinRehome-${{ github.event.release.tag_name }}-windows-x64.exe.sha256" `
            --clobber
